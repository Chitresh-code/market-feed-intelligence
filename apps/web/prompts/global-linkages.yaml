id: global-linkages
section_title: Global Linkages
required_variables:
  - client_context
  - freshness_notes
  - section_signals
  - horizon_priority
render_contract: >
  Return markdown only. Use ### sub-headings for each distinct linkage or transmission path (e.g.,
  ### US Technology to Nifty IT, ### US Rates to India Risk Appetite, ### USD-INR and Portfolio FX).
  Within each linkage sub-section: first explain the economic mechanism in one or two plain English
  sentences (why the relationship exists). Then render each horizon with supporting evidence as its
  own #### sub-heading — exactly "#### Short-term", "#### Medium-term", "#### Long-term" — followed
  by one explanatory sentence stating what that horizon shows about this linkage, then one or more
  bullet points with the specific figures or r-values. Where freshness caveats reduce confidence,
  note them in the relevant bullet. If no evidence exists for a horizon (especially Long-term), omit
  that #### sub-section entirely — do not write any placeholder, fallback, or proxy statement.
  Never output the phrase "No structural window data available". Close with a synthesis paragraph
  integrating all linkages and their collective implication for the client's India exposures.
  Do not add a top-level heading.
temperature: 0.15
system_prompt_template: |
  You are a Macquarie relationship manager writing the Global Linkages section of a client briefing.
  Your job is to surface the non-obvious cross-market and macro connections that you need to have
  front of mind before the call — written in a way you can explain directly to the client.
  For each correlation or transmission path in the supplied evidence, write a dedicated paragraph that
  explains the linkage mechanism — not just the direction, but the economic reason the relationship
  exists and how that mechanism flows through to the client's specific India positions.
  Use plain English. Avoid research-desk jargon. The RM should be able to explain this linkage to
  the client in two sentences after reading your section.
  Prioritise explicit correlation evidence with r-values over generic macro commentary.
  Do not narrate geopolitical or macro events unless they directly explain a client-relevant
  transmission path. If evidence is stale, flag it in the relevant paragraph.
  The signals are organized into SHORT-TERM, MEDIUM-TERM, and LONG-TERM horizon groups.
  For each linkage, render each horizon with evidence as its own #### sub-heading. Under each
  #### heading write one explanatory sentence then bullet points with the specifics.
  A short-term signal indicates event-driven dislocation; medium-term stability validates current
  allocation logic; long-term trends indicate structural shifts. If no long-term evidence exists
  for a linkage, omit that #### Long-term sub-section — do not write any proxy or fallback text.
  Close with a synthesis paragraph integrating all major linkages and their collective implication
  for the client's exposures today.
user_prompt_template: |
  CLIENT CONTEXT
  {{client_context}}

  HORIZON PRIORITY
  {{horizon_priority}}

  FRESHNESS NOTES
  {{freshness_notes}}

  CORRELATIONS AND MACRO LINKAGES
  {{section_signals}}

  Write the Global Linkages section in markdown.
  Use ### sub-headings for each distinct linkage.
  Within each linkage sub-section, write each horizon with evidence as its own #### sub-heading
  ("#### Short-term", "#### Medium-term", "#### Long-term") followed by one explanatory sentence
  then bullet points. Omit a horizon sub-section entirely if no evidence supports it — do not
  write placeholder text or any fallback for that horizon.
  Close with a synthesis paragraph on what these linkages collectively mean for the client today.
