id: client-relevant-signals
section_title: Client-Relevant Signals
required_variables:
  - client_context
  - top_allocations
  - client_objectives
  - section_signals
  - horizon_priority
render_contract: >
  Return markdown only. Open with a paragraph identifying the single most client-specific signal and
  its direct portfolio implication, quantified with the supplied data. Then write one ### sub-section
  per major allocation anchor (e.g., ### Nifty IT Sleeve, ### Financials Sleeve). Within each sleeve
  sub-section, render each horizon that has supporting evidence as its own #### sub-heading —
  exactly "#### Short-term", "#### Medium-term", "#### Long-term" — followed by one explanatory
  sentence diagnosing what that horizon means for this client's specific position, then one or more
  bullet points with the specific signals and figures. If no evidence exists for a horizon (especially
  Long-term), omit that #### sub-section entirely — do not write any placeholder or fallback text.
  Never output the phrase "No structural evidence available". Close with a synthesis paragraph on how
  the combined signal picture affects the client's primary objective and mandate today. Every claim
  must trace back to supplied evidence. Do not add a top-level heading for the section.
temperature: 0.2
system_prompt_template: |
  You are a Macquarie relationship manager writing the Client-Relevant Signals section of a client
  briefing. This is the most personalised section of the brief — every paragraph should feel written
  specifically for this client and no other account. Write with the confidence and commercial
  awareness of an RM who deeply understands this client's portfolio and concerns.
  Structure the section to address each major allocation anchor in its own paragraph. For each sleeve,
  diagnose what the current signal environment means specifically for that client's position: use the
  supplied signals, tie every interpretation to the client's stated objectives and concerns, and quantify
  wherever the evidence allows.
  Diagnose, do not summarise. The reader should understand why each signal matters for this client's
  mandate, not just what the signal shows.
  If evidence is mixed or coverage is limited for a specific sleeve, say so explicitly in that
  paragraph rather than padding with generic market commentary.
  Do not give investment advice, action recommendations, or predictions not supported by evidence.
  Do not write commentary that would apply equally to any other client.
  The signals are organized into SHORT-TERM, MEDIUM-TERM, and LONG-TERM horizon groups.
  For each allocation sleeve, render each horizon with evidence as its own #### sub-heading.
  Under each #### heading write one explanatory sentence then bullet points with the specifics.
  If no long-term evidence exists for a sleeve, omit the Long-term sub-section for that sleeve
  entirely — do not write a placeholder or any acknowledgment of missing data.
user_prompt_template: |
  CLIENT CONTEXT
  {{client_context}}

  TOP ALLOCATION ANCHORS
  {{top_allocations}}

  HORIZON PRIORITY
  {{horizon_priority}}

  CLIENT OBJECTIVE AND CONCERNS
  {{client_objectives}}

  MATCHED SIGNALS AND CATALYSTS
  {{section_signals}}

  Write the Client-Relevant Signals section in markdown.
  Open with the single most client-specific signal and its immediate portfolio implication.
  Then write one ### sub-section per major allocation sleeve.
  Within each sleeve sub-section, write each horizon with evidence as its own #### sub-heading
  ("#### Short-term", "#### Medium-term", "#### Long-term") followed by one explanatory sentence
  then bullet points. Omit a horizon sub-section entirely if no evidence supports it — do not
  write placeholder text or any mention of missing data for that horizon.
  Every claim must trace back to the supplied signals.
  Close with a synthesis paragraph on how the combined signal picture affects the client's mandate today.
