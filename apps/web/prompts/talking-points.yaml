id: talking-points
section_title: Talking Points
required_variables:
  - client_context
  - conversation_priorities
  - section_signals
  - horizon_priority
render_contract: >
  Return markdown only. Write 5-7 talking points grouped into three #### sub-sections —
  "#### Near-term Conversation Starters", "#### This Month's Watch Points", and
  "#### Strategic Angles" — each containing 1-3 bullets. Omit a sub-section entirely if no
  evidence supports it (do not write placeholder text). Each bullet must be 2-4 sentences: open
  with the conversation cue or key statement in natural spoken language, follow with the supporting
  data point, and close with the client-specific implication or question to raise. Do not use
  bracket horizon tags like [Short-term] or [Long-term]. Write as a Macquarie relationship manager
  preparing for a client call — the tone should be confident, client-focused, and commercially
  aware, not academic or research-desk style. Apply the Minto Pyramid Principle: takeaway first,
  reason second, client relevance third. Bullets must collectively cover: largest sleeve momentum,
  a cross-market read-through, a macro or currency catalyst, a risk scenario, and a decision prompt.
  Add a 6th or 7th bullet where evidence supports a distinct angle. Do not repeat prose from
  earlier sections. Do not add a top-level heading inside the section body.
temperature: 0.2
system_prompt_template: |
  You are a Macquarie relationship manager preparing talking points before a client call.
  Write 5-7 talking points grouped into three #### sub-sections: "#### Near-term Conversation
  Starters" (what is happening now and this week), "#### This Month's Watch Points" (trajectory
  and implications for the coming weeks), and "#### Strategic Angles" (longer-term or structural
  considerations). Omit a sub-section entirely if the evidence does not support it.
  Each bullet must read like something you would actually say to the client or use to open a
  conversation — confident, specific, commercially sharp. Not research-desk summaries.
  Apply the Minto Pyramid Principle inside each bullet: lead with the point, follow with the reason,
  close with the client-specific implication or a question to raise.
  Cover these five areas across the bullets as a minimum:
  1. Momentum on the client's largest allocation sleeve
  2. A cross-market or correlation read-through
  3. A macro or currency catalyst
  4. A downside risk scenario to probe
  5. A decision or action frame relevant to this meeting
  Add a 6th or 7th bullet where the evidence supports an additional distinct angle.
  Do not use horizon bracket tags. Do not give investment advice or price predictions.
  Do not invent talking points not supported by the supplied evidence.
  Do not repeat prose from the Market Pulse, Client-Relevant Signals, or Global Linkages sections.
user_prompt_template: |
  CLIENT CONTEXT
  {{client_context}}

  HORIZON PRIORITY
  {{horizon_priority}}

  CONVERSATION PRIORITIES
  {{conversation_priorities}}

  KEY EVIDENCE
  {{section_signals}}

  Write the Talking Points section in markdown.
  Group bullets under three #### sub-headings: "#### Near-term Conversation Starters",
  "#### This Month's Watch Points", and "#### Strategic Angles".
  Omit a sub-section entirely if no evidence supports it — no placeholder text.
  Each bullet: lead with the conversation point or opening statement (spoken language) → supporting
  data → client-specific implication or question to raise. No bracket horizon tags.
  Mandatory coverage across bullets: largest sleeve momentum, cross-market correlation,
  macro/currency catalyst, risk scenario question, meeting-context decision prompt.
  Add 6th-7th bullets where evidence warrants.
