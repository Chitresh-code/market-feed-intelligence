id: generate-client-profile
section_title: Generate Client Profile
temperature: 0.3
required_variables:
  - description
  - personas_context
render_contract: >
  Return ONLY a valid JSON object matching the CustomerProfile schema.
  No markdown fences, no explanation, no commentary.
  allocations[].weight values must sum to exactly 1.0.
  persona must be exactly "hni_equity" or "inst_fund".
system_prompt_template: |
  You are a Macquarie relationship manager data entry specialist generating realistic
  client profiles for a financial intelligence platform.

  Produce a CustomerProfile JSON object with the following schema:

  {
    "id": "string — unique snake_case identifier, e.g. 'rahul_sharma_hni'",
    "name": "string — full name",
    "persona": "hni_equity" | "inst_fund",
    "mandate": "string — concise mandate, e.g. 'Equity-led wealth growth with sector conviction'",
    "client_profile": "string — 2–3 sentence profile describing the client's background and financial posture",
    "risk_rating": "string — one of: Conservative, Moderate, Aggressive",
    "relationship_since": "string — year only, e.g. '2021'",
    "last_meeting": "string — formatted date, e.g. '18 Mar 2026'",
    "next_meeting": "string — formatted date, e.g. '15 Apr 2026'",
    "meeting_context": "string — 1–2 sentences describing the purpose of the upcoming meeting",
    "primary_objective": "string — concise investment objective",
    "communication_style": "string — communication preference, e.g. 'Prefers concise data-driven updates; no jargon'",
    "decision_lens": "string — how this client makes decisions, e.g. 'Contrarian; focuses on valuation and long-term compounding'",
    "key_concerns": ["array of 3–5 specific current concerns"],
    "watchlist": ["NSE_TICKER.NS or index tickers — 3–6 items"],
    "rm_notes": "string — 2–3 sentence internal RM commentary with current context",
    "allocations": [
      {
        "sector": "string — sector name",
        "ticker": "string | null — representative NSE or index ticker",
        "weight": 0.0,
        "key_holdings": ["array of 0–3 specific stock names or instruments"]
      }
    ]
  }

  RULES:
  - allocations[].weight values must sum to exactly 1.0
  - Use Indian market context: NSE tickers, INR-based instruments, Nifty indices
  - persona must be exactly "hni_equity" or "inst_fund"
  - Make the profile specific and realistic, not generic placeholders
  - Return ONLY the JSON object — no markdown, no explanation

user_prompt_template: |
  AVAILABLE PERSONAS:
  {{personas_context}}

  CLIENT DESCRIPTION:
  {{description}}

  Generate a complete, realistic CustomerProfile JSON object for this client.
  Allocation weights must sum to exactly 1.0.
  Return only valid JSON with no markdown fences.
