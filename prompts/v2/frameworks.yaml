id: frameworks
version: "1.0"
description: >
  Canonical definition file for the two-tier thinking framework used across all
  client briefing sections. This file is injected by the pipeline at runtime into
  each section prompt under the variable {{framework_definitions}}.
  Do not edit individual section YAMLs to change framework logic — edit here only.

# ═══════════════════════════════════════════════════════════════════════════════
#  TIER 1 — SHARED BRIEFING SPINE
#  C·A·L·I·B·R·A·T·E
#  Applies to ALL four sections. Governs briefing-level coherence.
#  Rule: if a failure would make the whole briefing wrong → this spine catches it.
# ═══════════════════════════════════════════════════════════════════════════════

calibrate_spine:
  name: "C·A·L·I·B·R·A·T·E"
  purpose: >
    The shared cognitive spine that governs briefing-level coherence across all
    four sections. Every section must clear all nine lenses before output is
    considered complete. These lenses are not stylistic preferences — they are
    quality gates. A section that fails any one of them is incomplete regardless
    of how well it satisfies its own section framework.
  injection_instruction: >
    When this framework is injected into a section prompt, the model must treat
    all nine lenses as active constraints throughout generation — not as a
    post-writing checklist. Each lens is a live filter applied sentence by sentence.

  lenses:

    C:
      name: "Client centrality"
      letter: C
      one_line: "Every sentence must be traceable to this specific client's mandate."
      full_definition: >
        Every sentence in the briefing must be traceable to this specific client's
        mandate, allocation profile, and stated objectives — not to generic emerging
        market commentary or sector-level observations that would apply to any client.
        The client's position is always the subject; the market is always the predicate.
        Write "Your 40% Midcap sleeve advanced…" not "The midcap index rose, which
        affects your sleeve."
      self_test: >
        "Would this sentence or paragraph be identical if written for a different
        institutional client in the same sector with a different mandate?"
        If yes — rewrite until the answer is no.
      failure_mode: >
        Writing market summaries with the client's name inserted, rather than writing
        from the client's position outward.

    A:
      name: "Asymmetry first"
      letter: A
      one_line: "Lead with what is non-obvious or directionally different from the prior session."
      full_definition: >
        Every section must open with — and weight most heavily — the information that
        changes what the client knows or needs to consider, not information that confirms
        what they already see on their screens. Confirming signals earn brief treatment.
        Challenging, surprising, or non-obvious signals earn the lead. The value the RM
        adds is the read-through and the second-order implication — not the restatement
        of index levels the client can observe themselves.
      self_test: >
        "Would the client already know this without the RM saying it?"
        If yes — the point has not earned its position. Reframe or replace.
      failure_mode: >
        Leading with the market event ("Nifty IT rose 6.3%") rather than the
        non-obvious implication ("Your IT sleeve is now tracking US tech at its
        tightest five-day correlation this quarter — which changes the diversification
        logic of holding both simultaneously").

    L:
      name: "Linkage primacy"
      letter: L
      one_line: "Transmission paths are more valuable than point-in-time signals."
      full_definition: >
        A signal is a data point. A linkage is an explanation of why that signal
        matters and how it travels to the client's position. Linkages — the economic
        mechanisms connecting global events to specific sleeves — are always more
        valuable than the signals themselves. Name the mechanism, not just the
        direction. "US tech rose" is a signal. "US tech earnings guidance lifts
        India IT export revenue expectations, which compresses the risk premium on
        your 15% IT sleeve" is a linkage.
      self_test: >
        "Have I explained why this signal matters and how it travels to this client's
        specific position, or have I only described what the signal shows?"
      failure_mode: >
        Citing correlations and confidence scores without explaining the economic
        mechanism that creates and sustains the relationship.

    I:
      name: "Inversion gate"
      letter: I
      one_line: "Before finalising, ask what would have to be true for this to be wrong."
      full_definition: >
        For every constructive signal or positive read, identify and name the
        falsifying condition — the specific development that would invalidate the
        conclusion. If that falsifying condition is already present in the data
        (e.g., stale macro, breadth concentration, accelerating yield pace), it must
        be named in the output as a tension or risk — not footnoted in a caveat or
        silently omitted. The inversion gate prevents the briefing from being
        systematically optimistic by making every positive conclusion earn its place
        against a named counter-condition.
      self_test: >
        "What specific, named development would make this conclusion wrong?
        Is that development currently visible in the evidence?
        If yes, have I named it explicitly in the output?"
      failure_mode: >
        Writing constructive conclusions without naming the conditions under which
        they would fail — or relegating those conditions to generic risk language
        ("markets could pull back") rather than evidence-specific triggers.

    B:
      name: "Bayesian freshness"
      letter: B
      one_line: "Stale data means lower confidence weight, not silence or equal certainty."
      full_definition: >
        Data staleness is a continuous variable, not a binary flag. A signal that is
        4 days old in a volatile period carries meaningfully less certainty than a
        same-day signal — but it still carries directional information that should not
        be suppressed. The correct treatment is probabilistic language downgrade:
        signals more than 2 days old must be framed as "directionally" or "as of
        [date]" — never cited with the same language certainty as live data.
        Do not suppress stale signals. Do not treat them as current. Downgrade their
        language to reflect their actual confidence weight.
      self_test: >
        "Is every figure I cite from a source that is more than 2 days old framed
        with appropriate uncertainty language? Am I treating stale data as current
        anywhere in this section?"
      language_tiers:
        fresh:
          threshold: "0-2 days"
          language: "Current figures — cite directly with full confidence."
        stale:
          threshold: "3-7 days"
          language: >
            Use "directionally" or "as of [date]". Frame conclusions as probable
            rather than certain. Example: "As of [date], the yield was trending
            toward X — directionally, this suggests Y, pending today's update."
        very_stale:
          threshold: ">7 days"
          language: >
            Flag explicitly. Use "the last available reading as of [date] showed…"
            Do not draw firm conclusions from data this old in volatile conditions.
      failure_mode: >
        Citing a 4-day-old rate figure with the same certainty as a live equity
        price, or suppressing a stale signal entirely when it still carries
        directional information the client needs.

    R:
      name: "Regime awareness"
      letter: R
      one_line: "Identify the session regime first. Let it govern section tone throughout."
      full_definition: >
        Before writing any section, classify the current macro regime for this
        mandate: risk-on, risk-off, or transitional. Name the single dominant driver.
        This classification is an internal anchor — it is not written into the output,
        but it governs tone, signal weighting, and emphasis throughout the section.
        Risk-on: lead with momentum, confirmation, and opportunity signals.
        Risk-off: lead with protection, liquidity, and drawdown signals.
        Transitional: name the tension explicitly — do not pick a side the evidence
        does not support. Critically: the regime classification cannot change
        mid-section. Risk-on language in the bullets and risk-off language in the
        synthesis is a regime coherence failure.
      self_test: >
        "Would a reader describe this section as risk-on, risk-off, or mixed?
        If mixed, have I explicitly named the tension and explained why both
        signals coexist? Is my tone consistent from opening to closing paragraph?"
      failure_mode: >
        Mixing risk-on bullet language (IT momentum, smallcap outperformance) with
        risk-off synthesis language (structural tightening, liquidity compression)
        without naming the tension — leaving the reader unable to determine the
        section's overall stance.

    A2:
      name: "Action framing"
      letter: "A (second)"
      one_line: "The RM must leave every section with something to do, ask, or decide."
      full_definition: >
        Every section must embed at least one decision prompt, monitoring trigger,
        or action frame that is specific to this client and this meeting. Generic
        prompts ("consider your allocation") do not qualify. The action frame must
        be derived from the specific evidence in the section and must be answerable
        or actionable in the current meeting or within a named timeframe.
        The action frame is not an afterthought bolted onto the end — it shapes
        which signals get foregrounded throughout the section, because the section's
        job is to prepare the RM to do something, not only to inform them.
      self_test: >
        "After reading this section, does the RM know what to do, ask, or monitor?
        Is that action specific to this client, this meeting, and this evidence —
        or would it apply equally to any client call?"
      failure_mode: >
        Closing sections with observation paragraphs that leave the RM informed but
        without a next step — or with generic action language ("monitor closely",
        "remain vigilant") that gives no specific trigger or threshold.

    T:
      name: "Tension surfacing"
      letter: T
      one_line: "Find and name the central contradiction in the evidence. Do not resolve it prematurely."
      full_definition: >
        The most valuable thing a briefing can do is hold the client's attention on
        the real complexity of their situation. When short-term signals and structural
        signals point in opposite directions — e.g., near-term IT momentum is strong
        while structural liquidity conditions are tightening — the briefing must name
        this tension explicitly rather than smoothing it into a single coherent
        narrative that the evidence does not support. The RM's job is to surface the
        tension, not to resolve it prematurely on the client's behalf. A briefing
        that papers over a genuine tension leaves the client exposed to a surprise
        the RM already saw in the data.
      self_test: >
        "Have I told the client something reassuring that the data does not fully
        support? Have I smoothed a real contradiction into a false coherence?
        If short-term and structural signals disagree, have I named that disagreement?"
      failure_mode: >
        Writing a positive synthesis paragraph over a mixed evidence set — e.g.,
        "overall the picture remains constructive" when yield acceleration and rupee
        depreciation are creating structural headwinds the near-term momentum does
        not offset.

    E:
      name: "Evidence traceability"
      letter: E
      one_line: "Every quantified claim maps to exactly one named signal in the supplied data."
      full_definition: >
        Every figure, percentage, price level, or quantified conclusion in the output
        must trace directly to a named signal in the supplied evidence. No rounding
        to vagueness, no invented context, no implied figures, no composite averages
        presented as point data unless flagged explicitly as such. If a conclusion
        requires a number that is not in the evidence, the conclusion cannot be drawn —
        or must be framed as inference without a quantified anchor.
        Evidence traceability is what makes the briefing defensible and re-runnable.
      self_test: >
        "Can I point to the exact supplied signal for every figure I have cited?
        Have I invented, implied, or averaged any number not explicitly in the data?"
      failure_mode: >
        Writing "the sector has shown consistent outperformance" without a cited
        figure, or implying a correlation exists without a confidence score or r-value
        in the supplied evidence.

# ═══════════════════════════════════════════════════════════════════════════════
#  TIER 2 — SECTION FRAMEWORKS
#  One per section. Each sits inside C·A·L·I·B·R·A·T·E.
#  Rule: if a failure only breaks one section → section framework catches it.
#  Each section framework inherits all nine CALIBRATE lenses automatically.
#  Section lenses govern the internal cognitive sequence specific to that section's job.
# ═══════════════════════════════════════════════════════════════════════════════

section_frameworks:

  # ─────────────────────────────────────────────────────────────────────────────
  #  MARKET PULSE — O·R·I·E·N·T
  #  Cognitive job: Orient the client in the session — what changed, what it means
  #  for their largest sleeves, what to watch next.
  # ─────────────────────────────────────────────────────────────────────────────
  market_pulse:
    name: "O·R·I·E·N·T"
    section: "Market Pulse"
    cognitive_job: >
      Give the RM a crisp, portfolio-specific picture of what changed this session
      and what it means for each sleeve. Not what the market did — what the client's
      positions did and why. The RM must be able to open the call from this section alone.
    calibrate_lenses_primary: ["C", "A", "R", "T", "E"]
    calibrate_lenses_secondary: ["I", "B", "A2"]

    lenses:

      O:
        name: "One-move dominance"
        letter: O
        calibrate_anchor: "A (Asymmetry first) + C (Client centrality)"
        one_line: "Identify the single development with the largest direct effect on the largest sleeve. Open there."
        full_definition: >
          Before writing anything, identify the single market development that had the
          largest direct effect on this client's largest allocation sleeve today.
          That development — quantified, named, and connected to the sleeve's weight —
          must open the section. Everything else is context, not the lead.
          The opening two sentences must be sufficient for the client to understand
          what mattered most today for their portfolio without reading further.
        self_test: >
          "If the client only read the first two sentences, would they know exactly
          what mattered most today for their portfolio and why?"
        failure_mode: >
          Opening with a generic market orientation paragraph before getting to the
          client's specific position — losing the client's attention before the
          relevant information arrives.

      R:
        name: "Regime-governed tone"
        letter: R
        calibrate_anchor: "R (Regime awareness)"
        one_line: "Classify the session regime internally first. It governs tone from opening to close."
        full_definition: >
          Classify the session regime before writing the first sleeve sub-section.
          This classification is internal — do not write it into the output.
          Risk-on: lead each sleeve with momentum and confirmation signals.
          Risk-off: lead with protection, liquidity, and drawdown dynamics.
          Transitional: name the tension explicitly — do not pick a side.
          The regime classification must hold consistently from the opening paragraph
          through to the closing paragraph. A section that opens risk-on and closes
          risk-off without naming the transition has failed this lens.
        self_test: >
          "Would a reader characterise this section as risk-on, risk-off, or mixed?
          If mixed, have I named why — or have I simply written inconsistent tone?"
        failure_mode: >
          Mixing momentum-positive sleeve language with structural-tightening synthesis
          language without explicitly naming and explaining the tension.

      I:
        name: "Inside-out sleeve framing"
        letter: I
        calibrate_anchor: "C (Client centrality)"
        one_line: "Client is the grammatical subject. Market is the predicate. Always."
        full_definition: >
          Every sleeve sub-section must be written from the client's position outward
          to the market — never from the market inward to the client.
          The client's sleeve is the subject of the opening sentence; the market
          development is what explains the sleeve's behaviour.
          WRONG: "The midcap index rose 1.20% over five days, which affects your
          40% Midcap allocation."
          RIGHT: "Your 40% Midcap sleeve has recovered 1.20% over five trading
          sessions, with domestic risk appetite returning as the primary driver."
          This is not a stylistic preference — it is a structural discipline that
          keeps the section client-focused rather than market-narrating.
        self_test: >
          "Is the client's sleeve (or position) the grammatical subject of the
          opening sentence of each sleeve sub-section?"
        failure_mode: >
          Starting sleeve paragraphs with index names, market levels, or sector
          movements — making the client's portfolio an afterthought rather than the frame.

      E:
        name: "Evidence-gated horizons"
        letter: E
        calibrate_anchor: "E (Evidence traceability) + B (Bayesian freshness)"
        one_line: "A horizon sub-section exists only if its evidence is direct and sleeve-specific."
        full_definition: >
          A horizon sub-section (#### Short-term, #### Medium-term, #### Long-term)
          may only be written if the evidence for that horizon is direct and
          sleeve-specific. Macro signals — rates, FX — may only appear in a sleeve's
          Long-term sub-section if they operate through a named, sleeve-specific
          mechanism (e.g., "rising discount rates compress forward earnings multiples
          for mid-cap growth names because their valuations are duration-sensitive").
          A generic assertion — "this affects all equities" — does not qualify as a
          sleeve-specific mechanism.
          If no sleeve-specific long-term evidence exists after applying this gate,
          omit #### Long-term entirely. Write nothing. No placeholder. No proxy.
          No acknowledgment of absence. An honest omission is more credible than a
          padded proxy paragraph.
        self_test: >
          "Could I remove this horizon sub-section and lose nothing sleeve-specific?
          Is the long-term evidence I am using actually specific to this sleeve,
          or am I using a macro signal as a proxy?"
        failure_mode: >
          Writing a Long-term sub-section for the Smallcap sleeve using US Treasury
          yield data without naming the specific mechanism by which yield changes
          affect smallcap liquidity or earnings for this client's specific holdings.

      N:
        name: "Next-session anchor"
        letter: N
        calibrate_anchor: "A2 (Action framing)"
        one_line: "Close with one threshold-specific watch item — specific enough that the RM knows if it fires."
        full_definition: >
          The closing paragraph must identify one specific, threshold-bound catalyst
          or risk to watch before the next session. The watch item must be specific
          enough that the RM would know immediately if it triggered — without needing
          to re-read the briefing.
          FAILS: "Watch US tech earnings and macro developments."
          PASSES: "Watch whether Nifty IT holds its five-day momentum as the US 10Y
          approaches the 4.40% level — a breach there has historically coincided with
          foreign portfolio flow reversals into Indian equities within 3-5 sessions."
          If the closing paragraph also names a central tension (short-term vs
          structural divergence), the tension is named first and the watch item closes.
        self_test: >
          "Is the watch item specific enough that the RM would immediately know if
          it triggered? Does it name a threshold, a named indicator, and a consequence?"
        failure_mode: >
          Generic forward-looking language — "watch global developments", "monitor
          liquidity conditions" — that gives the RM no specific trigger to act on.

      T:
        name: "Tension-visible synthesis"
        letter: T
        calibrate_anchor: "T (Tension surfacing) + I (Inversion gate)"
        one_line: "If signals diverge, name the contradiction. Do not smooth it into false coherence."
        full_definition: >
          If short-term signals and structural signals point in opposite directions,
          the closing paragraph must name this explicitly. Do not construct a single
          coherent narrative that irons out a contradiction the evidence does not
          resolve. The RM's job is to hold the tension in view for the client —
          not to resolve it on their behalf before the conversation happens.
          A closing paragraph that reads as uniformly positive over mixed evidence
          has failed this lens.
        self_test: >
          "Have I told the client something reassuring that the data does not fully
          support? If short-term and structural signals disagree, have I named that?"
        failure_mode: >
          Writing "the overall picture remains constructive" when near-term momentum
          exists alongside accelerating yield tightening and rupee depreciation —
          smoothing a genuine tension into a false coherence.

  # ─────────────────────────────────────────────────────────────────────────────
  #  CLIENT-RELEVANT SIGNALS — D·I·A·G·N·O·S·E
  #  Cognitive job: Move from signal to diagnosis — not what the data shows,
  #  but what it means for this specific mandate, position, and concern.
  # ─────────────────────────────────────────────────────────────────────────────
  client_relevant_signals:
    name: "D·I·A·G·N·O·S·E"
    section: "Client-Relevant Signals"
    cognitive_job: >
      Move from signal to diagnosis. Every paragraph must answer: given that this signal
      happened, what does this client now know, face, or need to decide that they did not
      before? The section must be unreplicable for any other client with a different mandate.
    calibrate_lenses_primary: ["C", "A", "I", "T", "E"]
    calibrate_lenses_secondary: ["B", "A2", "L"]

    lenses:

      D:
        name: "Diagnosis over description"
        letter: D
        calibrate_anchor: "C (Client centrality) + A (Asymmetry first)"
        one_line: "Report what the signal means for this mandate — not what it shows."
        full_definition: >
          The section fails if any paragraph can be summarised as "signal X happened."
          Every paragraph must answer: "Given that signal X happened, what does this
          client now know, face, or need to decide that they didn't before?"
          The diagnosis is the output. The signal is the input.
          DESCRIPTION: "Nifty IT closed at 31,403 with a five-day gain of 6.30%."
          DIAGNOSIS: "The IT sleeve's 6.30% five-day advance tightens the trade-off
          between capturing further momentum and the cost of trimming at elevated levels
          — the question for this call is whether the client wants to ride the current
          leg or take partial profit ahead of US earnings volatility."
        self_test: >
          "Am I reporting what the signal shows, or diagnosing what it means for
          this mandate and this client's current position?"
        failure_mode: >
          Writing what happened and then appending "this affects your sleeve" —
          which is description with a label, not diagnosis.

      I:
        name: "Intent anchoring"
        letter: I
        calibrate_anchor: "C (Client centrality)"
        one_line: "State the client's sleeve objective first. Every subsequent sentence is testable against it."
        full_definition: >
          Before writing each sleeve paragraph, internally restate the client's primary
          objective for that sleeve in one phrase. Every sentence you write about that
          sleeve must be testable against that objective. If a signal does not affect
          the objective, it does not belong in this section — regardless of how
          significant it appears in isolation.
          The intent anchor is also the replication test: if a different client had a
          different objective for the same sleeve (e.g., income vs. growth), would
          this paragraph change? If not, it is too generic.
        self_test: >
          "Would this paragraph be equally relevant to a client with a different
          objective in the same sleeve? If yes — rewrite until the client's specific
          objective is the organising principle."
        failure_mode: >
          Writing sector commentary that would apply to any client with IT exposure,
          without tying the signal to this client's specific growth-capture mandate
          or liquidity threshold constraint.

      A:
        name: "Asymmetric signal weighting"
        letter: A
        calibrate_anchor: "A (Asymmetry first)"
        one_line: "Signals that challenge current positioning earn more space than signals that confirm it."
        full_definition: >
          Confirming signals — those that validate what the client already knows and
          believes about their positioning — earn brief treatment. Challenging signals
          — those that complicate, contradict, or add a new dimension to the client's
          current view — earn the lead and the most detailed diagnosis.
          The asymmetry is deliberate: the client needs to hear most from the RM about
          what they might not have considered, not about what they already know.
          A section that spends equal time on confirming and challenging signals has
          not prioritised correctly.
        self_test: >
          "Does this section spend more words on what the client already knows and
          expects, or on what challenges or complicates their current view?"
        failure_mode: >
          Leading with the strong IT momentum confirmation while burying the
          structural liquidity tightening signal that challenges the mandate's
          growth-capture assumptions.

      G:
        name: "Granularity floor"
        letter: G
        calibrate_anchor: "E (Evidence traceability)"
        one_line: "Every diagnosis must be quantified to the degree the evidence allows."
        full_definition: >
          Qualitative diagnosis without a quantitative anchor fails the granularity
          floor. Every diagnosis must be quantified to the degree the evidence allows.
          If the evidence does not supply a figure, say so in one sentence — do not
          substitute qualitative padding for a missing number.
          FAILS: "IT momentum is strong and supports the sleeve's current weight."
          PASSES: "The 6.30% five-day IT advance represents the sleeve's strongest
          weekly momentum in the current briefing cycle — which changes the
          trim/hold calculus ahead of the next rebalancing window."
          When a figure is genuinely absent: "Direct performance data for [sub-sleeve]
          is not available in today's signals — diagnosis on this point is deferred."
        self_test: >
          "Could the RM use this diagnosis to frame a specific portfolio decision?
          Have I quantified every claim the evidence supports?"
        failure_mode: >
          Writing "the macro environment presents headwinds" without citing the
          specific yield level, FX rate, or signal figure that defines the headwind.

      N:
        name: "Named concern response"
        letter: N
        calibrate_anchor: "C (Client centrality) + T (Tension surfacing)"
        one_line: "Each named concern in client_objectives must be directly addressed — not as a footnote."
        full_definition: >
          The client's stated concerns (e.g., liquidity sensitivity, growth sentiment
          shifts, risk appetite changes) must be addressed directly in the relevant
          sleeve paragraph — not collected into a closing caveat or addressed generically
          in the synthesis. Each named concern is an organising principle for at least
          one sleeve paragraph.
          If the evidence does not address a named concern, say so in one sentence
          in the relevant sleeve paragraph: "Today's signals do not directly address
          [named concern] — this remains an open watch item."
        self_test: >
          "Have I explicitly addressed each concern listed in client_objectives,
          or only the ones that happen to be well-supported by easy signals?"
        failure_mode: >
          Addressing all of the signal-rich topics while silently skipping a named
          client concern because the evidence for it is limited — leaving the client
          without the acknowledgment they expect.

      O:
        name: "Objective-tension close"
        letter: O
        calibrate_anchor: "A2 (Action framing) + T (Tension surfacing)"
        one_line: "Synthesis must declare which side of the mandate tension the evidence currently favours."
        full_definition: >
          The synthesis paragraph must do three things:
          (1) Name the client's primary mandate tension — e.g., capturing emerging
          growth upside vs. maintaining liquidity threshold compliance.
          (2) Declare which side of that tension the current evidence favours —
          directionally, not as advice. "The evidence currently favours the growth-
          capture side, driven by [signal], though the structural tightening signals
          introduce a time constraint on this read."
          (3) Name the one signal that would most change this read if it shifted —
          this is the inversion check for the section.
          Do not summarise the section's bullets in the synthesis. Integrate across
          them and declare a directional read.
        self_test: >
          "Does the synthesis tell the client where they stand on their primary
          mandate trade-off today — and what single development would change that?"
        failure_mode: >
          Writing a synthesis paragraph that aggregates the section's bullets without
          declaring a directional read — leaving the client with more information
          but no clearer view of where they stand.

      S:
        name: "Silence discipline"
        letter: S
        calibrate_anchor: "E (Evidence traceability) + B (Bayesian freshness)"
        one_line: "Limited coverage gets one honest sentence. Not a padded paragraph."
        full_definition: >
          When signal coverage for a sleeve is limited, write one honest sentence
          naming the gap and stop. Do not write a paragraph of generic market
          commentary to fill the space. A short honest paragraph is more credible
          and more useful than a long paragraph built on weak or absent evidence.
          Similarly, horizon sub-sections with no direct sleeve-specific evidence
          are omitted entirely — no placeholder, no proxy, no acknowledgment of
          absence. The model writes what the evidence supports and nothing more.
        self_test: >
          "Am I writing this paragraph because I have something genuinely diagnostic
          to say, or because I feel the sleeve needs coverage? If the latter — stop."
        failure_mode: >
          Writing a full Long-term sub-section for the Auto sleeve using only generic
          macro commentary because no direct auto-sector structural signals exist.

  # ─────────────────────────────────────────────────────────────────────────────
  #  GLOBAL LINKAGES — T·R·A·C·E
  #  Cognitive job: Map the transmission path from a global signal to the client's
  #  specific position — mechanism first, magnitude second.
  # ─────────────────────────────────────────────────────────────────────────────
  global_linkages:
    name: "T·R·A·C·E"
    section: "Global Linkages"
    cognitive_job: >
      Map the full transmission path from global signal to client sleeve — not correlation
      for its own sake, but mechanism: why the relationship exists, how it travels, and
      what it means when it arrives at this portfolio. The RM must be able to explain
      any linkage to the client in two sentences after reading this section.
    calibrate_lenses_primary: ["L", "E", "B", "I", "A"]
    calibrate_lenses_secondary: ["C", "T", "A2"]

    lenses:

      T:
        name: "Transmission before correlation"
        letter: T
        calibrate_anchor: "L (Linkage primacy)"
        one_line: "Explain why the relationship exists before citing any r-value or confidence score."
        full_definition: >
          Every linkage sub-section must open with the economic mechanism — the reason
          the relationship exists and the path by which it flows to this client's
          specific exposure. The r-value or confidence score is cited after the
          mechanism, not before. A correlation without a mechanism is a coincidence.
          The mechanism is what makes the linkage durable, explainable to the client,
          and actionable for the RM.
          MECHANISM PATH FORMAT:
          [Global signal] → [economic reason] → [intermediate channel] →
          [arrival at sleeve] → [portfolio consequence for this client]
          Example: US tech earnings guidance → enterprise software demand outlook →
          India IT export revenue expectations → Nifty IT sentiment → mark-to-market
          on client's 15% IT sleeve.
        self_test: >
          "Could the RM explain in two sentences why this linkage exists — not just
          that it exists — after reading this paragraph?"
        failure_mode: >
          Leading with the confidence score or r-value and then noting the direction
          of correlation — without explaining why the economic relationship holds.

      R:
        name: "Relevance gate"
        letter: R
        calibrate_anchor: "C (Client centrality)"
        one_line: "A linkage earns a sub-section only if it has a named, direct effect on a specific client sleeve."
        full_definition: >
          Apply the relevance gate before writing — not after. For every candidate
          linkage, ask: "Which specific sleeve does this affect, through what
          mechanism, and with what named consequence for this client's position?"
          If any part of this question is unanswerable, the linkage is cut entirely.
          Do not include a linkage and then note its limited relevance inside the
          paragraph — cut it before writing. Global correlations with no clear
          path to a named sleeve are background, not client intelligence.
        self_test: >
          "Which specific sleeve does this linkage affect? What is the named
          mechanism? What is the portfolio consequence for this client?"
          If unanswerable on any count — cut.
        failure_mode: >
          Including a USD-INR linkage that is described in general terms without
          connecting it to the specific FX impact on this client's mid-cap
          holdings' earnings and liquidity profile.

      A:
        name: "Attenuation mapping"
        letter: A
        calibrate_anchor: "I (Inversion gate)"
        one_line: "Name at least one factor that weakens or delays this linkage's transmission."
        full_definition: >
          Every transmission path loses signal strength as it travels from global
          origin to client portfolio. Attenuation factors — FX buffers, domestic
          policy offsets, sector-specific insulation, data lags, structural breaks —
          must be named for each linkage. This is not a caveat; it is part of the
          transmission model. Naming the attenuation factor is what makes the linkage
          honest: it tells the RM under what conditions the linkage holds and under
          what conditions it weakens.
          Every linkage sub-section must include at least one attenuation sentence
          after the horizon sub-sections.
        self_test: >
          "Have I named at least one factor that could weaken or delay this linkage's
          effect on the client's position? Is the attenuation factor specific to
          this linkage and this client, or is it generic?"
        failure_mode: >
          Presenting transmission paths as deterministic without acknowledging the
          factors (policy, hedging, market structure) that routinely attenuate them.

      C:
        name: "Confidence-scored evidence"
        letter: C
        calibrate_anchor: "E (Evidence traceability) + B (Bayesian freshness)"
        one_line: "Every linkage carries a confidence score. Language tier is assigned by score. Never treat 0.75 as 0.90."
        full_definition: >
          Every linkage must carry a confidence score or r-value from the supplied
          evidence. If neither is available, the linkage must be explicitly framed
          as a directional inference — not an established correlation.
          Apply the confidence language tier consistently:
          - Confidence ≥ 0.85 or r ≥ 0.80 → "established linkage"
            Suitable for portfolio-level positioning logic.
          - Confidence 0.70–0.84 or r 0.60–0.79 → "directionally reliable"
            Suitable for framing and monitoring. Not a sole basis for positioning.
          - Confidence < 0.70 or r < 0.60 → "monitor only"
            Directional inference. Flag as such. No portfolio conclusions drawn.
          A 0.75 confidence signal and a 0.90 confidence signal must read
          differently in the output. Never treat a lower-tier signal with the
          language certainty of an established linkage.
        self_test: >
          "Is every confidence score or r-value accompanied by the correct language
          tier? Am I treating any 'directionally reliable' signal as 'established'?"
        failure_mode: >
          Describing a 0.75 confidence linkage as a primary driver of portfolio
          positioning without the appropriate language hedge — overstating certainty
          and exposing the RM to a client challenge.

      E:
        name: "Evidence-ranked synthesis"
        letter: E
        calibrate_anchor: "A (Asymmetry first) + T (Tension surfacing) + A2 (Action framing)"
        one_line: "Synthesis ranks linkages by signal strength. Names the dominant one. Names the pivoting one."
        full_definition: >
          The synthesis paragraph must do three things:
          (1) Rank the linkages by current signal strength — confidence score,
          freshness, and directness of effect on the client's largest sleeve.
          (2) Name the dominant linkage today and explain why it dominates this
          session specifically — not in all sessions.
          (3) Name the pivoting linkage — the one whose shift would most change
          the portfolio read. This is the inversion check for the section.
          The synthesis must not open by restating what individual linkages showed.
          It must integrate across them and deliver a ranked, actionable read.
          After reading the synthesis, the RM must know which linkage to lead with
          on the call and what to watch for a change in that dominance.
        self_test: >
          "After reading the synthesis, does the RM know which linkage dominates
          today, why it dominates, and what would change that dominance?"
        failure_mode: >
          Writing a synthesis that aggregates all linkages as equally important —
          "all three linkages present risks" — without ranking or naming which
          one the RM should weight most heavily in today's conversation.

  # ─────────────────────────────────────────────────────────────────────────────
  #  TALKING POINTS — P·R·I·M·E
  #  Cognitive job: Prepare the RM for a real conversation — not a presentation.
  #  Each bullet is the opening line of a dialogue, not a structured summary.
  # ─────────────────────────────────────────────────────────────────────────────
  talking_points:
    name: "P·R·I·M·E"
    section: "Talking Points"
    cognitive_job: >
      Prepare the RM for a real conversation. Each bullet is the opening line of a
      dialogue — spoken naturally, not presented formally. The RM must be able to say
      any bullet aloud without reformatting it and have the client lean forward rather
      than lean back.
    calibrate_lenses_primary: ["C", "A", "I", "A2"]
    calibrate_lenses_secondary: ["L", "T", "E", "B", "R"]
    coverage_areas:
      description: >
        Hidden constraint — applied as a post-generation completeness check,
        NOT as a structural template. The five areas must be covered across the
        full set of bullets, not one area per bullet. Do not use these as headings
        or bullet prompts. Generate naturally, then verify coverage.
      areas:
        - "Momentum on the client's largest allocation sleeve"
        - "A cross-market or correlation read-through"
        - "A macro or currency catalyst"
        - "The inversion-bound downside risk scenario"
        - "The meeting-specific decision frame"

    lenses:

      P:
        name: "Client-world opening"
        letter: P
        calibrate_anchor: "C (Client centrality)"
        one_line: "Every bullet opens from the client's world. Market is the evidence. Not the opening."
        full_definition: >
          Every bullet must open from the client's world — their position, their
          concern, or their recent experience — and then bring in the market evidence
          as support. The market is never the grammatical subject of the opening sentence.
          WRONG: "Nifty IT rose 6.3% over five days, which benefits your 15% allocation."
          RIGHT: "Your IT sleeve is sitting on its strongest five-day run this quarter
          — the 6.3% advance is now tracking closely with US tech's 5.28% gain over
          the same window, which tightens the cross-market read-through in a way
          worth discussing."
          This discipline ensures the bullet sounds like an RM speaking to a client
          about their portfolio — not an analyst presenting a market summary.
        self_test: >
          "Does the bullet open with the client's experience or the market's behaviour?
          Could the RM say this sentence to the client as the first thing on a call?"
        failure_mode: >
          Opening every bullet with an index name, price level, or percentage move —
          writing market summaries that happen to mention the client's sleeve,
          rather than client-position statements that happen to be grounded in market data.

      R:
        name: "Read-through, not report"
        letter: R
        calibrate_anchor: "A (Asymmetry first) + L (Linkage primacy)"
        one_line: "Every bullet must contain something the client could not have worked out themselves."
        full_definition: >
          A talking point earns its place by surfacing a non-obvious connection —
          a cross-market read-through, a second-order implication, or a structural
          dynamic the client may not have surfaced themselves. A bullet that only
          confirms what the client already sees on their screens has not added value.
          The RM's job is to show the client something they could not see alone.
          After drafting each bullet, ask: "Would the client already know this
          without the RM saying it?" If yes — the bullet has not earned its place.
          Reframe it around the non-obvious implication.
        self_test: >
          "Is there a cross-market connection, second-order effect, or structural
          dynamic in this bullet that the client would not have arrived at themselves?"
        failure_mode: >
          Writing bullets that restate index performance or signal levels the client
          can observe directly — adding a question at the end to create the appearance
          of insight without the substance.

      I:
        name: "Inversion-bound risk bullet"
        letter: I
        calibrate_anchor: "I (Inversion gate) + E (Evidence traceability)"
        one_line: "The risk bullet names a specific trigger, a mechanism, and a named portfolio consequence."
        full_definition: >
          The downside or risk talking point must be evidence-bound and
          threshold-specific. It must contain three named elements:
          (1) A specific, named signal condition that would trigger the risk —
              not "if markets fall" but "if the US 10Y continues at its current
              pace of +0.04% per day."
          (2) The mechanism by which that condition flows to the client's portfolio —
              not "affecting sentiment" but "compressing foreign portfolio flows into
              liquidity-sensitive mid- and small-cap names."
          (3) The named mandate or position consequence — "which sits directly
              against your mandate's sensitivity to domestic market depth."
          FAILS: "There is a risk of a pullback that could affect your small-cap sleeve."
          PASSES: "If the US 10Y continues at its current +0.04%/day pace, the
          historical read-through suggests foreign flows into EM small-caps compress
          within 3-5 sessions — which hits your 30% smallcap sleeve at its most
          liquidity-sensitive point."
        self_test: >
          "Does this risk bullet name a specific trigger, a mechanism, and a
          named consequence? Would the client know immediately if this condition fired?"
        failure_mode: >
          Writing a generic risk disclaimer — "markets could pull back impacting
          your portfolio" — that gives the client no specific trigger to watch
          and no mechanism to monitor.

      M:
        name: "Meeting-specific decision frame"
        letter: M
        calibrate_anchor: "A2 (Action framing)"
        one_line: "One bullet frames a decision answerable in this meeting. Not deferred. Not generic."
        full_definition: >
          Exactly one bullet across the full section must frame a decision or action
          that is specific to this meeting's context and answerable in this
          conversation. The client must be able to respond with yes, no, or
          "let me check" — not "let's discuss this next quarter."
          The decision frame is derived from the client's current positioning and
          the evidence — not from a generic "consider your allocation" prompt.
          If no clean decision is available, frame a monitoring commitment:
          "We agree to watch [named trigger] and reconvene if it fires within
          [named timeframe]." That is still a meeting-specific decision frame —
          it is answerable and time-bound.
          There must be exactly one decision frame bullet in the full set.
          Multiple decision frames dilute the meeting's focus.
        self_test: >
          "Can the client respond to this decision frame in this meeting?
          Is it specific to this client's current position and evidence —
          or would it apply to any RM-client conversation?"
        failure_mode: >
          Writing a decision frame that defers to a future meeting, requests more
          data before deciding, or is so generic ("should we review allocations?")
          that it carries no meeting-specific weight.

      E:
        name: "Earned question close"
        letter: E
        calibrate_anchor: "C (Client centrality)"
        one_line: "A question must be earned by the bullet's argument. If it isn't, replace it with a stronger statement."
        full_definition: >
          If a bullet ends with a question, that question must be earned by the
          evidence and argument in the preceding sentences. It must feel like the
          natural next move in a real conversation — something the RM genuinely
          wants answered because the answer changes what they do next.
          Questions appended to bullets solely to signal engagement — "What are
          your thoughts on this?" — must be removed. If the bullet is strong enough,
          it does not need a question. A powerful statement often does more
          conversational work than a weak question.
          Test every question: "Would the RM's next action genuinely depend on
          the client's answer to this?" If not — cut the question.
        self_test: >
          "Would the RM's next action genuinely change based on the client's
          answer to this question? Or did I add it to create the appearance of
          engagement?"
        failure_mode: >
          Appending generic questions ("What are your thoughts?", "How are you
          positioning for this?") to bullets that are already complete — making
          the bullet read like a survey rather than a conversation.

# ═══════════════════════════════════════════════════════════════════════════════
#  PIPELINE INJECTION INSTRUCTIONS
#  How to inject this file into section prompts at runtime.
# ═══════════════════════════════════════════════════════════════════════════════

pipeline_injection:
  variable_name: "{{framework_definitions}}"
  description: >
    At runtime, the pipeline injects the relevant framework definitions into each
    section prompt using the {{framework_definitions}} variable. Each section
    receives: (1) the full CALIBRATE spine definition, and (2) its own section
    framework definition. No section receives another section's framework.

  injection_map:
    market_pulse:
      receives:
        - calibrate_spine          # full 9-lens definition
        - section_frameworks.market_pulse  # O·R·I·E·N·T 6-lens definition

    client_relevant_signals:
      receives:
        - calibrate_spine          # full 9-lens definition
        - section_frameworks.client_relevant_signals  # D·I·A·G·N·O·S·E 7-lens definition

    global_linkages:
      receives:
        - calibrate_spine          # full 9-lens definition
        - section_frameworks.global_linkages  # T·R·A·C·E 5-lens definition

    talking_points:
      receives:
        - calibrate_spine          # full 9-lens definition
        - section_frameworks.talking_points   # P·R·I·M·E 5-lens definition

  injection_position: >
    Inject {{framework_definitions}} at the top of the system_prompt_template,
    before all other instructions. The model must process the framework definitions
    before reading the section-specific instructions. Place it under a clearly
    labelled block:

      ACTIVE FRAMEWORKS — READ BEFORE GENERATING
      {{framework_definitions}}

  format_note: >
    The pipeline should render framework_definitions as clean prose paragraphs,
    not as raw YAML. Convert the structured YAML fields into a readable block
    the model can process naturally. Recommended format per lens:

      [LETTER] [NAME] — [ONE_LINE]
      [FULL_DEFINITION]
      Self-test: [SELF_TEST]
      Failure mode to avoid: [FAILURE_MODE]

  staleness_policy: >
    frameworks.yaml is the single source of truth for all framework definitions.
    Never edit framework logic directly in section YAMLs.
    Version-control this file independently from section YAMLs.
    When a framework lens is updated here, all four sections inherit the change
    automatically at the next pipeline run — no section YAML edits required.
